<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Códigos QR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        :root {
            --primary: #8B5A2B; /* Tono marrón cálido */
            --primary-light: #A06D3B;
            --background: #F5F2EB;
            --surface: #FFFFFF;
            --text: #3E2723;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--surface);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(62, 39, 35, 0.08);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--text);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.98);
        }

        button.scanning {
            background-color: #d32f2f;
        }

        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: none !important; /* Quita el borde por defecto de la librería */
            background: #000;
        }

        .history-section {
            margin-top: 25px;
        }

        h2 {
            font-size: 1.2rem;
            border-bottom: 2px solid var(--background);
            padding-bottom: 8px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: var(--background);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            word-break: break-all;
            border-left: 4px solid var(--primary);
        }

        .timestamp {
            display: block;
            font-size: 0.75rem;
            color: #757575;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            color: #9e9e9e;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Escáner QR</h1>
        
        <div class="btn-container">
            <button id="btn-toggle">Iniciar Cámara</button>
        </div>

        <div id="reader" style="display: none;"></div>

        <div class="history-section">
            <h2>Códigos Registrados</h2>
            <ul id="history-list" class="history-list">
                </ul>
        </div>
    </div>

    <script>
        const btnToggle = document.getElementById('btn-toggle');
        const readerDiv = document.getElementById('reader');
        const historyList = document.getElementById('history-list');
        
        let html5QrCode;
        let isScanning = false;

        // Configuración del escáner
        const qrConfig = { 
            fps: 10, 
            qrbox: function(width, height) {
                // Caja de escaneo adaptativa (70% del ancho del contenedor)
                const minEdge = Math.min(width, height);
                const qrboxSize = Math.floor(minEdge * 0.7);
                return { width: qrboxSize, height: qrboxSize };
            }
        };

        // Al cargar la página, mostramos el historial guardado en LocalStorage
        document.addEventListener('DOMContentLoaded', loadHistory);

        // Evento del botón principal
        btnToggle.addEventListener('click', () => {
            if (!isScanning) {
                startScanner();
            } else {
                stopScanner();
            }
        });

        function startScanner() {
            readerDiv.style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");

            // 'environment' prioriza la cámara trasera en dispositivos móviles
            html5QrCode.start(
                { facingMode: "environment" }, 
                qrConfig,
                onScanSuccess
            ).then(() => {
                isScanning = true;
                btnToggle.textContent = "Detener Cámara";
                btnToggle.classList.add('scanning');
            }).catch(err => {
                console.error("Error al iniciar la cámara:", err);
                alert("No se pudo acceder a la cámara. Asegúrate de dar los permisos necesarios.");
                readerDiv.style.display = 'none';
            });
        }

        function stopScanner() {
            if (html5QrCode && isScanning) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    readerDiv.style.display = 'none';
                    isScanning = false;
                    btnToggle.textContent = "Iniciar Cámara";
                    btnToggle.classList.remove('scanning');
                }).catch(err => console.error("Error al detener la cámara:", err));
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Detenemos el escáner inmediatamente tras una lectura exitosa para evitar duplicados masivos
            stopScanner();
            
            // Sonido de confirmación (opcional, generado nativamente por la API de Audio de la web)
            playBeep();

            // Guardar datos
            saveRecord(decodedText);
        }

        function saveRecord(text) {
            const now = new Date();
            const timestamp = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();

            const record = { text, timestamp };

            // Obtener historial previo de LocalStorage
            let history = JSON.parse(localStorage.getItem('qr_history')) || [];
            // Insertar al inicio para que el más reciente aparezca arriba
            history.unshift(record); 
            localStorage.setItem('qr_history', JSON.stringify(history));

            // Actualizar la interfaz
            renderHistory();
        }

        function loadHistory() {
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('qr_history')) || [];
            historyList.innerHTML = '';

            if (history.length === 0) {
                historyList.innerHTML = '<li class="empty-state">No hay códigos registrados todavía.</li>';
                return;
            }

            history.forEach(item => {
                const li = document.createElement('li');
                li.className = 'history-item';
                
                // Si el texto es un enlace, lo hacemos clickeable
                if (item.text.startsWith('http://') || item.text.startsWith('https://')) {
                    li.innerHTML = `<a href="${item.text}" target="_blank" style="color: var(--primary); font-weight: 500;">${item.text}</a>`;
                } else {
                    li.innerHTML = `<strong>Dato:</strong> ${escapeHtml(item.text)}`;
                }
                
                li.innerHTML += `<span class="timestamp">${item.timestamp}</span>`;
                historyList.appendChild(li);
            });
        }

        // Función para generar un "beep" sutil al escanear con éxito
        function playBeep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
        }

        // Seguridad básica para evitar inyección de código si el QR contiene HTML
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
